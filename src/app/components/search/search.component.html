<div class="modal-overlay" (click)="onOverlayClick()">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Search dialog" (click)="$event.stopPropagation()">
    <button class="modal-exit" (click)="closeModal()" aria-label="Close search">✕</button>

    <div class="search-view">
      <header class="modal-header">
        <div class="modal-title">
          <h2>Find a university</h2>
          <p class="modal-sub">Search by name, city, or state</p>
        </div>
      </header>

      <div class="modal-body">
        <label for="university-search" class="sr-only">Enter your university</label>
        <div class="search-field">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path>
          </svg>
          <input
            #searchInput
            id="university-search"
            type="text"
            placeholder="e.g. Harvard University, Boston, Illinois..."
            class="search-input"
            [(ngModel)]="query"
            (input)="onInputChange()"
            (keydown.enter)="submit()"
          />
          <button *ngIf="query" class="clear-btn" (click)="query=''; onInputChange(); searchInput.focus();" aria-label="Clear">✕</button>
          <button class="search-submit" (click)="submit()" aria-label="Submit search">Search</button>
        </div>
      </div>

      <!-- Loading state -->
      <div class="results-loading" *ngIf="isLoading()">
        <div class="spinner"></div>
        <span>Loading universities...</span>
      </div>

      <!-- Results list -->
      <ul class="results-list" *ngIf="!isLoading() && filteredUniversities.length">
        <li
          *ngFor="let u of filteredUniversities"
          class="result-item"
          (click)="selectUniversity(u)"
          tabindex="0"
          (keydown.enter)="selectUniversity(u)"
        >
          <img
            [src]="getUniversityLogo(u)"
            [alt]="u.name + ' logo'"
            class="university-logo"
            (error)="handleImageError($event)"
          />
          <div class="result-main">
            <div class="result-name">
              <span>{{ u.name }}</span>
              <button class="compare-icon-btn" (click)="addToCompare(u, $event)" title="Add to Compare">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="7" height="7"></rect>
                  <rect x="14" y="3" width="7" height="7"></rect>
                  <rect x="14" y="14" width="7" height="7"></rect>
                  <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
              </button>
            </div>
            <div class="result-meta">{{ u.city }}, {{ u.state }} • {{ u.type }}</div>
          </div>
          <a class="result-link" [href]="u.website" target="_blank" rel="noopener noreferrer" (click)="$event.stopPropagation()">website</a>
        </li>
      </ul>

      <!-- Free-text search option — lets users search ANY university via AI -->
      <div class="free-search-option" *ngIf="!isLoading() && showFreeSearch" (click)="navigateToFreeSearch(query)">
        <div class="free-search-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path>
          </svg>
        </div>
        <div class="free-search-text">
          <span class="free-search-label">Search for</span>
          <strong>"{{ query }}"</strong>
          <span class="free-search-hint">— get AI-powered details</span>
        </div>
        <svg class="free-search-arrow" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </div>

      <!-- Empty state -->
      <div class="empty-state" *ngIf="!isLoading() && !filteredUniversities.length && !query">
        <p>No universities found. Try searching by name or city.</p>
      </div>
    </div>
  </div>
</div>
